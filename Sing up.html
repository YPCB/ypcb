        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="" id="form2Example34" checked />

        </div>
      </div>
  
      <div class="col">
        <!-- Simple link -->
        <a href="#!">Forgot password?</a>
      </div>
    </div>

    style="color: #fff; background-color: #1172b7;
    width: 100%;">Log in</button>
